<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple Scraper</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:20px}</style>
</head>
<body>
  <h1>Simple Scraper</h1>
  <form action="{{ url_for('scrape') }}" method="post">
    <input type="url" name="url" placeholder="https://example.com" required style="width:420px;padding:8px">
    <button type="submit">Scrape</button>
  </form>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <ul>
      {% for m in messages %}
        <li style="color:crimson">{{ m }}</li>
      {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}
</body>
</html>
