<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Scrape history</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:20px} a{color:navy}</style>
</head>
<body>
  <h1>Scrape history</h1>
  <p><a href="{{ url_for('index') }}">New scrape</a></p>
  <table border="1" cellpadding="6" cellspacing="0">
    <tr><th>ID</th><th>URL</th><th>Title</th><th>Created</th></tr>
    {% for e in entries %}
      <tr>
        <td><a href="{{ url_for('history_entry', item_id=e.id) }}">{{ e.id }}</a></td>
        <td><a href="{{ e.url }}" target="_blank">{{ e.url }}</a></td>
        <td>{{ e.title }}</td>
        <td>{{ e.created_at }}</td>
      </tr>
    {% else %}
      <tr><td colspan="4">No entries</td></tr>
    {% endfor %}
  </table>
</body>
</html>
